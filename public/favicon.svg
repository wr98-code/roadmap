<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d18"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c96a"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
  <!-- Z glyph -->
  <text x="5" y="23" font-family="'Space Mono', monospace" font-size="18" font-weight="700" fill="url(#gold)" letter-spacing="-1">Z∅</text>
</svg>
